name: CI — Feature → Dev

on:
  pull_request:
    branches: [dev]
  workflow_call:

jobs:
  # ─── 1. COMPILATION ───────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: ./mvnw compile -B

  # ─── 2. FORMAT (Spotless) ─────────────────────────────────
  format:
    name: Code Format Check
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw spotless:check -B

  # ─── 3. ANALYSE QUALITÉ QODANA (JetBrains) ────────────────
  qodana:
    name: Qodana Code Quality
    runs-on: ubuntu-latest
    needs: format
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write # Requis pour afficher les alertes dans l'onglet Security de GitHub
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true

      # Envoie les résultats à GitHub Security (onglet Code Scanning)
      - uses: github/codeql-action/upload-sarif@v4
        if: always() # S'exécute même si Qodana trouve des erreurs
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

    # ─── 4. TESTS D'INTÉGRATION (Quarkus + Testcontainers) ────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: qodana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw verify -Pintegration-tests -B
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-reports
          path: target/failsafe-reports/

  # ─── 5. DOC OPENAPI ───────────────────────────────────────
  doc:
    name: OpenAPI Doc Check
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      # Using 'mvn' directly avoids the 11ms phantom execution bug
      - run: mvn compile quarkus:build -Dquarkus.smallrye-openapi.store-schema-directory=target/openapi -B
      - run: test -f target/openapi/openapi.json && echo "OpenAPI doc OK"

  # ─── 6. SCAN VULNÉRABILITÉS CODE (Trivy filesystem) ───────
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  # ─── 7. SCAN DÉPENDANCES (Grype) ──────────────────────────
  grype:
    name: Grype Dependency Scan
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v4
        id: scan
        env:
          GRYPE_DB_AUTO_UPDATE: "true" # Forces Grype to fetch the latest DB
        with:
          path: '.'
          fail-build: false
          output-format: sarif

  # ─── 8. ANTIVIRUS (ClamAV) ────────────────────────────────
  antivirus:
    name: Antivirus Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ClamAV Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          # 1. On arrête le service automatique qui bloque le fichier
          sudo systemctl stop clamav-freshclam
          # 2. On met à jour la base de données virale manuellement
          sudo freshclam
          # 3. On lance le scan
          sudo clamscan --recursive --infected --remove=no .

  # ─── 9. MISES À JOUR (Versions check) ─────────────────────
  dependency-updates:
    name: Dependency Updates Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw versions:display-dependency-updates -B | tee dep-updates.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-updates-report
          path: dep-updates.txt

