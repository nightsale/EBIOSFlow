name: CI — Feature → Dev

on:
  pull_request:
    branches: [dev]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-feature.yml'
  workflow_call:
defaults:
  run:
    working-directory: ./backend

jobs:
  # ─── 1. COMPILATION ───────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: ./mvnw compile -B

  # ─── 2. FORMAT (Spotless) ─────────────────────────────────
  format:
    name: Code Format Check
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw spotless:check -B

  # ─── 3. ANALYSE QUALITÉ Sonarqube ────────────────
  sonarqube:
    name: "SonarQube Scan"
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Cache pour accélérer l'analyse SonarQube
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze with SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Nécessaire pour les PR
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dmaven.test.skip=true

    # ─── 4. TESTS D'INTÉGRATION (Quarkus + Testcontainers) ────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [sonarqube]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw verify -Pintegration-tests -B
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: failsafe-reports
          path: backend/target/failsafe-reports/

  # ─── 5. DOC OPENAPI ───────────────────────────────────────
  doc:
    name: OpenAPI Doc Check
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw compile quarkus:build -Dquarkus.smallrye-openapi.store-schema-directory=target/openapi -B
      - run: test -f target/openapi/openapi.json && echo "OpenAPI doc OK"

  # ─── 6. SCAN VULNÉRABILITÉS CODE (Trivy filesystem) ───────
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  # ─── 7. SCAN DÉPENDANCES (Grype) ──────────────────────────
  grype:
    name: Grype Dependency Scan
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/scan-action@v7
        id: scan
        env:
          GRYPE_DB_AUTO_UPDATE: "true" # Forces Grype to fetch the latest DB
        with:
          path: '.'
          fail-build: false
          output-format: sarif

  # ─── 8. ANTIVIRUS (ClamAV) ────────────────────────────────
  antivirus:
    name: Antivirus Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ClamAV Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          # 1. On arrête le service automatique qui bloque le fichier
          sudo systemctl stop clamav-freshclam
          # 2. On met à jour la base de données virale manuellement
          sudo freshclam
          # 3. On lance le scan
          sudo clamscan --recursive --infected --remove=no .

  # ─── 9. MISES À JOUR (Versions check) ─────────────────────
  dependency-updates:
    name: Dependency Updates Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw versions:display-dependency-updates -B | tee dep-updates.txt
      - uses: actions/upload-artifact@v7
        with:
          name: dependency-updates-report
          path: dep-updates.txt

