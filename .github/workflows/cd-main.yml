name: CD — Dev → Main (Release)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Rejoue toute la CI (même checks)
  full-ci:
    uses: ./.github/workflows/ci-feature.yml

  # ─── BUILD DOCKER + SCAN IMAGE ────────────────────────────
  docker-scan:
    name: Docker Build & Trivy Image Scan
    runs-on: ubuntu-latest
    needs: full-ci
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: ./mvnw package -DskipTests -B
      - name: Build Docker image
        run: docker build -f src/main/docker/Dockerfile.jvm -t ebiosflow:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ebiosflow:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

  # ─── RELEASE AUTOMATIQUE ──────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: docker-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # historique complet pour semantic-release
          persist-credentials: false
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec
      - name: Package JAR asset
        run: ./mvnw package -DskipTests -B
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      # Push image Docker vers GHCR avec le tag version
      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag ebiosflow:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/ebiosflow:${{ env.RELEASE_VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/ebiosflow:${{ env.RELEASE_VERSION }}